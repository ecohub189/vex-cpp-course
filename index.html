<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEX C++ Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0e;
    --surface: #131316;
    --border: rgba(255,255,255,0.07);
    --text: #e8e6e1;
    --muted: #6b6a67;
    --accent: #c8f765;
    --accent-dim: rgba(200, 247, 101, 0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 32px 120px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    margin-bottom: 72px;
    animation: fadeUp 0.6s ease both;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 20px;
    height: 1px;
    background: var(--accent);
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(36px, 6vw, 52px);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
    color: var(--text);
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    font-size: 13px;
    line-height: 1.8;
    color: var(--muted);
    font-weight: 300;
    max-width: 480px;
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 48px 0;
  }

  /* Section label */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* Lessons list */
  .lessons {
    list-style: none;
    margin-bottom: 56px;
  }

  .lesson-item {
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.5s ease forwards;
  }

  .lesson-item:nth-child(1) { animation-delay: 0.15s; }
  .lesson-item:nth-child(2) { animation-delay: 0.22s; }
  .lesson-item:nth-child(3) { animation-delay: 0.29s; }
  .lesson-item:nth-child(4) { animation-delay: 0.36s; }
  .lesson-item:nth-child(5) { animation-delay: 0.43s; }

  .lesson-link {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 18px 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s ease;
    position: relative;
  }

  .lesson-link::after {
    content: '→';
    font-size: 14px;
    color: var(--muted);
    margin-left: auto;
    transition: all 0.2s ease;
    opacity: 0;
    transform: translateX(-6px);
  }

  .lesson-link:hover {
    color: var(--accent);
  }

  .lesson-link:hover::after {
    opacity: 1;
    transform: translateX(0);
    color: var(--accent);
  }

  .lesson-num {
    font-size: 11px;
    color: var(--muted);
    width: 24px;
    flex-shrink: 0;
    font-weight: 300;
  }

  .lesson-title {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  /* Bottom links */
  .links-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.5s forwards;
  }

  .link-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    background: var(--surface);
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }

  .link-pill:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .link-pill svg {
    width: 13px;
    height: 13px;
    opacity: 0.7;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  header { animation: fadeUp 0.5s ease 0.05s both; }
</style>
</head>

  <div class="section-label">Lessons</div>

</div>
</body>
</html>
